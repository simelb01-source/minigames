<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Maluniversum XXL</title>

<style>
    body {
        margin: 0;
        background: white;
        font-family: Arial, sans-serif;
    }

    #toolbar {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(255,255,255,0.95);
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        box-shadow: 0 0 8px rgba(0,0,0,0.2);
        z-index: 10;
        max-width: 180px;
    }

    #toolbar button {
        margin-top: 4px;
        width: 150px;
        padding: 6px;
        cursor: pointer;
    }

    canvas {
        display: block;
    }
</style>
</head>

<body>

<div id="toolbar">
    <strong>Farbe & Größe</strong><br>
    <input type="color" id="colorPicker" value="#ff0000"><br><br>
    <input type="range" id="sizeSlider" min="1" max="40" value="5"><br><br>

    <strong>Werkzeuge</strong><br>
    <button id="pencilBtn">Stift</button>
    <button id="eraserBtn">Radiergummi</button>
    <button id="rainbowBtn">Regenbogen‑Pinsel</button>
    <button id="sprayBtn">Sprühdose</button><br>

    <strong>Vorlagen</strong><br>
    <button id="templateBtn">Ausmal‑Vorlage</button><br>

    <strong>Aktionen</strong><br>
    <button id="clearBtn">Löschen</button>
    <button id="saveBtn">Speichern</button>
</div>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// Canvas auf Fenstergröße setzen
function resizeCanvas() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let painting = false;
let currentColor = "#ff0000";
let currentSize = 5;
let tool = "pencil"; // pencil, eraser, rainbow, spray
let rainbowHue = 0;

// Toolbar Events
document.getElementById("colorPicker").addEventListener("input", e => {
    currentColor = e.target.value;
    if (tool === "rainbow") tool = "pencil";
});

document.getElementById("sizeSlider").addEventListener("input", e => {
    currentSize = e.target.value;
});

document.getElementById("pencilBtn").addEventListener("click", () => {
    tool = "pencil";
});

document.getElementById("eraserBtn").addEventListener("click", () => {
    tool = "eraser";
});

document.getElementById("rainbowBtn").addEventListener("click", () => {
    tool = "rainbow";
});

document.getElementById("sprayBtn").addEventListener("click", () => {
    tool = "spray";
});

document.getElementById("clearBtn").addEventListener("click", () => {
    ctx.clearRect(0, 0, c.width, c.height);
});

document.getElementById("templateBtn").addEventListener("click", () => {
    // einfache Ausmal‑Vorlage: Haus mit Sonne
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;
    ctx.lineCap = "round";

    const cx = c.width / 2;
    const cy = c.height / 2;
    const w = 300;
    const h = 200;

    ctx.strokeRect(cx - w/2, cy - h/2, w, h);

    ctx.beginPath();
    ctx.moveTo(cx - w/2, cy - h/2);
    ctx.lineTo(cx, cy - h/2 - 150);
    ctx.lineTo(cx + w/2, cy - h/2);
    ctx.closePath();
    ctx.stroke();

    ctx.strokeRect(cx - 40, cy + h/2 - 100, 80, 100);

    ctx.strokeRect(cx - w/2 + 30, cy - h/2 + 30, 60, 60);
    ctx.strokeRect(cx + w/2 - 90, cy - h/2 + 30, 60, 60);

    const sx = cx + w/2 + 120;
    const sy = cy - h/2 - 120;
    ctx.beginPath();
    ctx.arc(sx, sy, 40, 0, Math.PI * 2);
    ctx.stroke();
    for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 / 12) * i;
        ctx.beginPath();
        ctx.moveTo(sx + Math.cos(angle) * 50, sy + Math.sin(angle) * 50);
        ctx.lineTo(sx + Math.cos(angle) * 80, sy + Math.sin(angle) * 80);
        ctx.stroke();
    }

    ctx.restore();
});

// SPEICHERN MIT WEISSEM HINTERGRUND + BRANDING
document.getElementById("saveBtn").addEventListener("click", () => {

    // Temporäres Canvas für Export
    const exportCanvas = document.createElement("canvas");
    const exportCtx = exportCanvas.getContext("2d");

    exportCanvas.width = c.width;
    exportCanvas.height = c.height;

    // Weißer Hintergrund
    exportCtx.fillStyle = "white";
    exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

    // Originalbild draufkopieren
    exportCtx.drawImage(c, 0, 0);

    // Branding
    exportCtx.font = "24px Arial";
    exportCtx.fillStyle = "rgba(0,0,0,0.6)";
    exportCtx.textAlign = "right";
    exportCtx.fillText("© Charlytaxi", exportCanvas.width - 20, exportCanvas.height - 20);

    // Dateiname
    const name = prompt("Dateiname eingeben:", "Maluniversum.png");
    if (!name) return;

    const link = document.createElement("a");
    link.download = name.endsWith(".png") ? name : name + ".png";
    link.href = exportCanvas.toDataURL("image/png");
    link.click();
});

// Zeichnen
function start(e) {
    painting = true;
    draw(e);
}

function end() {
    painting = false;
    ctx.beginPath();
}

function getPos(e) {
    const rect = c.getBoundingClientRect();
    return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
    };
}

function draw(e) {
    if (!painting) return;

    const pos = getPos(e);
    const x = pos.x;
    const y = pos.y;

    if (tool === "spray") {
        sprayAt(x, y);
        return;
    }

    if (tool === "eraser") {
        ctx.strokeStyle = "white";
        ctx.lineWidth = currentSize * 2;
    } else if (tool === "rainbow") {
        rainbowHue = (rainbowHue + 3) % 360;
        ctx.strokeStyle = `hsl(${rainbowHue}, 100%, 50%)`;
        ctx.lineWidth = currentSize;
    } else {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
    }

    ctx.lineCap = "round";
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
}

function sprayAt(x, y) {
    const density = 25;
    ctx.fillStyle = currentColor;
    for (let i = 0; i < density; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * currentSize * 2;
        const sx = x + Math.cos(angle) * radius;
        const sy = y + Math.sin(angle) * radius;
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }
}

c.addEventListener("mousedown", start);
c.addEventListener("mouseup", end);
c.addEventListener("mouseleave", end);
c.addEventListener("mousemove", draw);
</script>

</body>
</html>
