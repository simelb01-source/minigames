<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mini‑Game Sammlung – Startseite</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
  }

  .container {
    background: rgba(0,0,0,0.35);
    padding: 40px 50px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.4);
    backdrop-filter: blur(6px);
  }

  h1 {
    margin-bottom: 10px;
    font-size: 36px;
    font-weight: bold;
  }

  p {
    margin-bottom: 30px;
    font-size: 18px;
  }

  .btn {
    display: block;
    width: 260px;
    padding: 15px;
    margin: 12px auto;
    font-size: 20px;
    font-weight: bold;
    color: #333;
    background: #ffe082;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    background: #ffecb3;
    transform: scale(1.05);
  }

  .footer {
    margin-top: 25px;
    font-size: 14px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Mini‑Game Sammlung</h1>
  <p>Wähle ein Spiel und hab Spass!</p>

  <button class="btn" onclick="location.href='minigames.html'">
    🎮 Spiele öffnen
  </button>

  <button class="btn" onclick="location.href='https://charles-malu.github.io'">
    🌐 Zur Hauptseite
  </button>

  <div class="footer">
    © 2026 – Maluniversum Mini‑Games
  </div>
</div>

</body>
</html>
