<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Game Sammlung</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4dd0e1, #81d4fa);
            font-family: Arial, sans-serif;
        }

        .container {
            background: rgba(0, 0, 0, 0.25);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            width: 320px;
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
        }

        p {
            margin-bottom: 30px;
            font-size: 18px;
        }

        .button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #ffeb3b;
            color: #333;
            text-decoration: none;
            font-size: 18px;
            border-radius: 10px;
            font-weight: bold;
        }

        .button:hover {
            background: #fdd835;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Mini-Game Sammlung</h1>
        <p>Wähle ein Spiel und hab Spass!</p>

        <!-- Link zur Spieleseite -->
        <a href="minigames.html" class="button">🎮 Spiele öffnen</a>

        <!-- Optionaler Link (kann auch entfernt werden) -->

    </div>

</html>
